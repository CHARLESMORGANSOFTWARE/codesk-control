name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and publish, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Show Swift version
        run: swift --version

      - name: Run release checks
        run: scripts/release-check.sh

      - name: Verify tag matches binary version
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          version="$(./.build/release/codesk version | awk '{print $2}')"
          if [[ "$TAG_NAME" != "v$version" ]]; then
            echo "Tag $TAG_NAME does not match codesk version $version" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          files=(dist/*.tar.gz dist/*.sha256)
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes --verify-tag
          fi
